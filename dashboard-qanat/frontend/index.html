<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/lumiera-icon.png" />
    <link rel="apple-touch-icon" href="/lumiera-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#02030a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Lumiera" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <title>Qanat Cinematic Studio Premium</title>
    <!-- Dashmin typography: PT Sans (+ Inter fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://js.puter.com/v2/"></script>
  </head>
  <body
    class="bg-dash-bg text-gray-200 antialiased font-sans overflow-x-hidden"
  >
    <div id="root"></div>
    <script>
      (function () {
        var RELOAD_KEY = "lumiera.stale-chunk-reload";
        var MIGRATION_KEY = "lumiera.cache-migration-v5";

        function clearDeployCaches() {
          var ops = [];
          if ("serviceWorker" in navigator) {
            ops.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(
                  regs.map(function (r) {
                    return r.unregister();
                  })
                );
              })
            );
          }
          if ("caches" in window) {
            ops.push(
              caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  })
                );
              })
            );
          }
          return Promise.all(ops);
        }

        function hardReload() {
          var url = new URL(window.location.href);
          url.searchParams.set("_lumiera_reload", String(Date.now()));
          window.location.replace(url.toString());
        }

        if (!localStorage.getItem(MIGRATION_KEY)) {
          localStorage.setItem(MIGRATION_KEY, "1");
          clearDeployCaches().finally(hardReload);
          return;
        }

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          var msg =
            reason && reason.message
              ? String(reason.message)
              : String(reason || "");
          if (
            !/Failed to fetch dynamically imported module|Importing a module script failed|Loading chunk [\d]+ failed/i.test(
              msg
            )
          ) {
            return;
          }
          if (sessionStorage.getItem(RELOAD_KEY)) return;
          sessionStorage.setItem(RELOAD_KEY, "1");
          event.preventDefault();
          clearDeployCaches().finally(hardReload);
        });

        window.addEventListener("load", function () {
          sessionStorage.removeItem(RELOAD_KEY);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
