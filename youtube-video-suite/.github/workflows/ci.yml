name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.12.1"

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: youtube-video-suite/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: youtube-video-suite
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: youtube-video-suite
        run: pnpm build

      - name: Typecheck
        working-directory: youtube-video-suite
        run: pnpm typecheck

      - name: Test
        working-directory: youtube-video-suite
        run: pnpm test

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        working-directory: youtube-video-suite
        run: docker build -f Dockerfile.api -t video-suite-api:latest .

      - name: Build Studio image
        working-directory: youtube-video-suite
        run: docker build -f Dockerfile.studio -t video-suite-studio:latest .
