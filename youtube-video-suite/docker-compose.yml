services:
  postgres:
    image: postgres:16-alpine
    container_name: video-suite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: video_suite
      POSTGRES_PASSWORD: video_suite
      POSTGRES_DB: video_suite
    ports:
      - "5432:5432"
    volumes:
      - video_suite_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video_suite -d video_suite"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: video-suite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - video_suite_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: video-suite-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - video_suite_minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/video-suite;
      mc anonymous set private local/video-suite;
      exit 0;
      "

volumes:
  video_suite_postgres:
  video_suite_redis:
  video_suite_minio:
