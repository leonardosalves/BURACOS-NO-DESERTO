version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: videosuite
      POSTGRES_PASSWORD: videosuite_dev
      POSTGRES_DB: videosuite
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U videosuite"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://videosuite:videosuite_dev@postgres:5432/videosuite
      REDIS_URL: redis://redis:6379
      PORT: "3001"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage:/app/storage

  # ── Studio Web ──
  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    ports:
      - "5180:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  storage:
